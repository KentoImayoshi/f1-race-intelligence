[project]
name = "f1-core"
version = "0.1.0"
description = "Shared core utilities for F1 Race Intelligence"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["f1_core*"]
