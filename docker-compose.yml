services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    command:
      - uvicorn
      - f1_api.main:app
      - --host
      - "${API_HOST:-0.0.0.0}"
      - --port
      - "${API_PORT:-8000}"
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      ENV: "${ENV:-production}"
      DEBUG: "${DEBUG:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      API_V1_PREFIX: "${API_V1_PREFIX:-/api/v1}"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; from urllib.error import URLError, HTTPError; try: resp = urllib.request.urlopen('http://localhost:8000/ready', timeout=3); except (URLError, HTTPError): sys.exit(1); sys.exit(0 if resp.status == 200 else 1)"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard/Dockerfile
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      F1_API_BASE_URL: "${F1_API_BASE_URL:-http://api:${API_PORT:-8000}}"
      F1_API_PREFIX: "${API_V1_PREFIX:-/api/v1}"
      STREAMLIT_SERVER_HEADLESS: "1"
      STREAMLIT_SERVER_PORT: "${STREAMLIT_SERVER_PORT:-8501}"
      ENV: "${ENV:-production}"
      DEBUG: "${DEBUG:-false}"
    restart: unless-stopped
