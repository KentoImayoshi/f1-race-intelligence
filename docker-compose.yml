services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    command: ["uvicorn", "f1_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      ENV: "production"
      DEBUG: "false"
      LOG_LEVEL: "INFO"
    restart: unless-stopped
  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard/Dockerfile
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      F1_API_BASE_URL: "http://api:8000"
      F1_API_PREFIX: "/api/v1"
      STREAMLIT_SERVER_HEADLESS: "1"
      STREAMLIT_SERVER_PORT: "8501"
      ENV: "production"
      DEBUG: "false"
    restart: unless-stopped
